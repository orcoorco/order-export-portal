<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Export Portal</title>
  <meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <meta name="googlebot" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
  <style>
    :root {
      --bg: #edf4f7;
      --card: #ffffff;
      --ink: #12202b;
      --muted: #4b6071;
      --brand: #0c6d86;
      --brand2: #1d92a8;
      --line: #d2e0e9;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 8% 14%, #d7e6ee 0%, transparent 35%),
        radial-gradient(circle at 95% 16%, #d4eded 0%, transparent 40%),
        var(--bg);
    }

    main {
      width: min(900px, 92vw);
      margin: 36px auto;
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(18, 32, 43, 0.06);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.55rem;
      letter-spacing: 0.2px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border-radius: 10px;
      border: 1px solid var(--line);
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.2px;
      padding: 10px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.93rem;
      background: #f4f8fb;
      color: var(--ink);
    }

    .btn-primary {
      border: 0;
      color: #fff;
      background: linear-gradient(120deg, var(--brand), var(--brand2));
    }

    .meta {
      margin-top: 12px;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.55;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      background: #f4f8fb;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 1px 6px;
    }

    #status {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.55;
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.86rem;
    }

    .hidden { display: none; }

    .gate-wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .gate {
      width: min(420px, 92vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(18, 32, 43, 0.06);
    }

    .gate h2 {
      margin: 0 0 10px;
      font-size: 1.25rem;
    }

    .gate p {
      margin: 0 0 12px;
    }

    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 1rem;
      margin-bottom: 10px;
      background: #fff;
      color: var(--ink);
    }

    #authMessage {
      min-height: 1.2em;
      color: #a2192b;
      font-size: 0.9rem;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <div id="authGateWrap" class="gate-wrap">
    <section class="gate">
      <h2>Lösenord krävs</h2>
      <p>Ange lösenord för att komma till nedladdningen.</p>
      <input class="input" id="passwordInput" type="password" autocomplete="current-password" placeholder="Lösenord">
      <button class="btn btn-primary" id="loginBtn" type="button">Logga in</button>
      <div id="authMessage"></div>
    </section>
  </div>

  <main id="appMain" class="hidden">
    <section class="card">
      <h1>Export Portal</h1>
      <p>Senaste filen byggs automatiskt var 15:e minut.</p>
      <div class="actions">
        <a class="btn btn-primary" href="./latest/report_latest.xls" download>
          Ladda ner senaste XLS
        </a>
        <button class="btn" id="refreshBtn" type="button">
          Uppdatera status
        </button>
      </div>
      <div class="meta">
        Fil: <span class="mono">docs/latest/report_latest.xls</span><br>
        Notering: kräver lokal inloggning i webbläsaren.
      </div>
    </section>

    <section class="card">
      <strong>Status</strong>
      <div id="status">Läser status...</div>
    </section>
  </main>

  <script>
    const AUTH_PASSWORD = "cykelkopp";
    const AUTH_STORAGE_KEY = "export_portal_auth_v1";
    const AUTH_PERSIST_MS = 1000 * 60 * 60 * 24 * 365 * 20; // 20 years

    function saveAuth() {
      const payload = {
        ok: true,
        expiresAt: Date.now() + AUTH_PERSIST_MS
      };
      localStorage.setItem(AUTH_STORAGE_KEY, JSON.stringify(payload));
    }

    function hasAuth() {
      try {
        const raw = localStorage.getItem(AUTH_STORAGE_KEY);
        if (!raw) return false;
        const parsed = JSON.parse(raw);
        return Boolean(parsed && parsed.ok && Number(parsed.expiresAt) > Date.now());
      } catch {
        return false;
      }
    }

    function showApp() {
      document.getElementById("authGateWrap").classList.add("hidden");
      document.getElementById("appMain").classList.remove("hidden");
      loadStatus();
    }

    function showGate() {
      document.getElementById("authGateWrap").classList.remove("hidden");
      document.getElementById("appMain").classList.add("hidden");
      document.getElementById("passwordInput").focus();
    }

    function tryLogin() {
      const input = document.getElementById("passwordInput");
      const msg = document.getElementById("authMessage");
      if (input.value === AUTH_PASSWORD) {
        saveAuth();
        msg.textContent = "";
        input.value = "";
        showApp();
        return;
      }
      msg.textContent = "Fel lösenord.";
    }

    async function loadStatus() {
      const statusEl = document.getElementById("status");
      const fileUrl = "./latest/report_latest.xls";
      const tsUrl = "./latest/last_updated_utc.txt";

      try {
        const [headRes, tsRes] = await Promise.all([
          fetch(fileUrl, { method: "HEAD", cache: "no-store" }),
          fetch(tsUrl, { cache: "no-store" })
        ]);

        const lines = [];
        if (headRes.ok) {
          const length = headRes.headers.get("content-length");
          const modified = headRes.headers.get("last-modified");
          lines.push("XLS tillgänglig: JA");
          if (modified) lines.push(`Server last-modified: ${modified}`);
          if (length) lines.push(`Storlek (bytes): ${length}`);
        } else {
          lines.push(`XLS tillgänglig: NEJ (${headRes.status})`);
        }

        if (tsRes.ok) {
          const txt = (await tsRes.text()).trim();
          lines.push(`Senast publicerad (UTC): ${txt}`);
        } else {
          lines.push("Senast publicerad (UTC): okänd");
        }

        statusEl.textContent = lines.join("\n");
      } catch (err) {
        statusEl.textContent = `Kunde inte läsa status: ${err.message}`;
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadStatus);
    document.getElementById("loginBtn").addEventListener("click", tryLogin);
    document.getElementById("passwordInput").addEventListener("keydown", (event) => {
      if (event.key === "Enter") tryLogin();
    });

    if (hasAuth()) {
      showApp();
    } else {
      showGate();
    }
  </script>
</body>
</html>
